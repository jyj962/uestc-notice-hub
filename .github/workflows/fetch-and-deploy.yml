# 每天自动抓取学校通知并部署到 GitHub Pages
name: Fetch Notices & Deploy

on:
  schedule:
    # 每天 00:00 和 10:00 UTC（北京时间 08:00 和 18:00）
    - cron: '0 0 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scripts/fetch_and_save.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
